<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro</title>
</head>
<body>
    <form id="time_input">
        <label for="time">Time:</label>
        <input type="number" id="time", name="time">
        <button type="button" onclick="set_time()">Enter</button>
    </form>
    <h1 id="timer">00:00</h1>
    <button onclick="pause()">Pause</button>
</body>
</html>

<script>
let on = false
let current_status = NaN
let pomodoros = 0
let intervalID = null
let countdownEl = document.getElementById('timer')
let settings = {
    'work': 5,
    'break': 10,
    'longBreak': 15,
    'pomodoroIntervals': 4
}
let time = 0

function timeOver() {
    if (current_status == 'work'){
        pomodoros += 1
        console.log(pomodoros)
        if (pomodoros % settings.pomodoroIntervals === 0){
            
            current_status = 'longBreak'
        } else {
            current_status = 'break'
        }
    } else {
        current_status = 'work'
    }
    startPhase(current_status)
}

function startPhase(phase){
    time = settings[phase]
    intervalID = setInterval(updateCountdown, 1000);
}

function set_time() {
    update_screen()

    if (intervalID !== null) {
        clearInterval(intervalID)
    }
}

function update_screen() {
    const minutes = Math.floor(time/60);
    let seconds = time % 60;
    seconds = seconds < 10 ? '0' + seconds : seconds;

    countdownEl.textContent = `${minutes}:${seconds}`
}

function updateCountdown() {
        time--;
        if (time < 0){
            time = 0
            clearInterval(intervalID)
            intervalID = null
            timeOver()
        }

        update_screen()
}


function pause() {
    if (on) {
        clearInterval(intervalID)
        on = false
    } else {
        intervalID = setInterval(updateCountdown, 1000);
        on = true
    }
    
}
</script>
